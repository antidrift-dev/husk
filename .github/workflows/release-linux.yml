name: Build Linux (x64)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v0.2.92)'
        required: true
        default: 'v0.2.92'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          TAG=${{ github.event.release.tag_name || inputs.tag }}
          VERSION=${TAG#v}
          BUILD=$(echo $VERSION | cut -d. -f3)
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.build.buildVersion=String($BUILD); fs.writeFileSync('package.json', JSON.stringify(p,null,2))"

      - name: Install Linux build deps
        run: sudo apt-get install -y rpm

      - name: Build
        run: npm run build:main && npm run build:renderer && npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
