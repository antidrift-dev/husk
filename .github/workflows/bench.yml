name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

# Write access needed to commit bench-history.json back to the repo
permissions:
  contents: write

jobs:
  bench:
    name: Bench (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build main process only — renderer not needed for unit benchmarks
      - name: Build
        run: npm run build:main

      - name: Run benchmarks
        run: npm run bench:run

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.os }}
          path: bench-history.json

  # Merge all three platform results and commit back to the repo.
  # [skip ci] in the commit message prevents an infinite loop.
  merge:
    name: Merge results
    needs: bench
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: bench-artifacts

      - name: Merge histories
        run: npx tsx scripts/merge-bench.ts

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bench-history.json
          git diff --staged --quiet || git commit -m "chore: update bench-history [skip ci]"
          git push
